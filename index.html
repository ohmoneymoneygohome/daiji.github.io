<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代际知识库 - 理解世代差异，支撑业务决策</title>
    <link rel="icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=intergenerational%20knowledge%20base%20icon%20book%20generations%20symbol%20minimal%20design&image_size=square" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#8B5CF6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('wallhaven-0wqo7r.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }
        
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.8) 0%, rgba(139, 92, 246, 0.8) 100%);
            z-index: 1;
        }
        
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        
        .btn-hover {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-hover::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }
        
        .btn-hover:hover::before {
            left: 100%;
        }
        
        .fade-in {
            animation: fadeIn 1.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <section class="hero-section">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        
        <!-- WebGL 3D动画 -->
        <canvas id="webgl-canvas"></canvas>
        
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 z-30 text-center">
            <div class="fade-in">
                <h1 class="text-5xl sm:text-7xl font-bold text-white mb-6">
                    代际知识库
                </h1>
                <p class="text-xl sm:text-2xl text-white/90 mb-12 max-w-2xl mx-auto">
                    理解世代差异，支撑业务决策
                </p>
                <a href="home.html" class="btn-hover inline-block px-12 py-5 bg-white text-primary font-semibold rounded-full shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 text-lg">
                    <i class="fa fa-arrow-right mr-2"></i>立即访问
                </a>
            </div>
        </div>
        
        <!-- 页脚 -->
        <footer class="absolute bottom-8 left-0 right-0 text-center z-30">
            <p class="text-white/60 text-sm">
                © 2026 代际知识库 | 大器层·代际研究
            </p>
        </footer>
    </section>
    
    <script>
        // 为按钮添加点击效果
        const accessBtn = document.querySelector('.btn-hover');
        accessBtn.addEventListener('click', function(e) {
            e.preventDefault();
            // 添加点击动画
            this.classList.add('scale-95');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 200);
        });
        
        // WebGL 3D动画
        (function() {
            // 创建场景
            const scene = new THREE.Scene();
            
            // 创建相机
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            // 创建渲染器
            const renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('webgl-canvas'),
                alpha: true,
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // 世代头像URL
            const generationAvatars = [
                'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20portrait%20of%20older%20person%20baby%20boomer%20generation%20corporate%20style&image_size=square', // 婴儿潮世代
                'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20portrait%20of%20middle%20aged%20person%20generation%20x%20business%20style&image_size=square', // X世代
                'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20portrait%20of%20young%20adult%20millennial%20generation%20modern%20style&image_size=square', // Y世代
                'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20portrait%20of%20teenager%20generation%20z%20digital%20native%20style&image_size=square', // Z世代
                'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=illustration%20of%20child%20generation%20alpha%20digital%20native%20style&image_size=square', // α世代
                'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=futuristic%20illustration%20of%20child%20generation%20beta%20AI%20native%20style&image_size=square' // Beta世代
            ];
            
            // 加载纹理
            const textureLoader = new THREE.TextureLoader();
            const textures = [];
            let loadedTextures = 0;
            
            generationAvatars.forEach((avatarUrl, index) => {
                textureLoader.load(avatarUrl, (texture) => {
                    textures[index] = texture;
                    loadedTextures++;
                    if (loadedTextures === generationAvatars.length) {
                        initScene();
                    }
                });
            });
            
            // 世代数据
            const generations = [];
            
            // 初始化场景
            function initScene() {
                // 创建世代头像
                generationAvatars.forEach((avatarUrl, index) => {
                    const group = new THREE.Group();
                    
                    // 创建多个头像实例
                    const avatarCount = 15;
                    for (let i = 0; i < avatarCount; i++) {
                        // 创建平面几何体
                        const geometry = new THREE.PlaneGeometry(0.5, 0.5);
                        
                        // 创建材质
                        const material = new THREE.MeshBasicMaterial({
                            map: textures[index],
                            transparent: true,
                            opacity: 0.8,
                            side: THREE.DoubleSide
                        });
                        
                        // 创建网格
                        const avatar = new THREE.Mesh(geometry, material);
                        
                        // 随机位置
                        const radius = 3 + index * 0.5;
                        const angle = (i / avatarCount) * Math.PI * 2;
                        const x = Math.sin(angle) * radius;
                        const y = Math.cos(angle) * radius;
                        const z = (Math.random() - 0.5) * 2;
                        
                        avatar.position.set(x, y, z);
                        
                        // 随机旋转
                        avatar.rotation.x = Math.random() * Math.PI;
                        avatar.rotation.y = Math.random() * Math.PI;
                        
                        group.add(avatar);
                    }
                    
                    scene.add(group);
                    
                    generations.push({
                        group: group,
                        speed: 0.005 + index * 0.001,
                        rotationSpeed: 0.001 + index * 0.0005
                    });
                });
                
                // 创建世代连接线条
                const lineGeometry = new THREE.BufferGeometry();
                const linePositions = new Float32Array(generationAvatars.length * 3);
                
                for (let i = 0; i < generationAvatars.length; i++) {
                    const radius = 3 + i * 0.5;
                    linePositions[i * 3] = Math.sin(i * Math.PI * 2 / generationAvatars.length) * radius;
                    linePositions[i * 3 + 1] = Math.cos(i * Math.PI * 2 / generationAvatars.length) * radius;
                    linePositions[i * 3 + 2] = 0;
                }
                
                lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
                
                const lineMaterial = new THREE.LineBasicMaterial({
                    color: 0xffffff,
                    transparent: true,
                    opacity: 0.3
                });
                
                const line = new THREE.LineLoop(lineGeometry, lineMaterial);
                scene.add(line);
                
                // 动画循环
                function animate() {
                    requestAnimationFrame(animate);
                    
                    // 旋转和移动头像组
                    generations.forEach((gen, index) => {
                        gen.group.rotation.x += gen.rotationSpeed;
                        gen.group.rotation.y += gen.rotationSpeed;
                        
                        // 头像组脉动效果
                        const time = Date.now() * 0.001;
                        gen.group.scale.set(
                            1 + Math.sin(time * gen.speed * 2) * 0.1,
                            1 + Math.sin(time * gen.speed * 2) * 0.1,
                            1 + Math.sin(time * gen.speed * 2) * 0.1
                        );
                        
                        // 为每个头像添加独立动画
                        gen.group.children.forEach((avatar, avatarIndex) => {
                            const avatarTime = time + avatarIndex * 0.1;
                            avatar.rotation.x += 0.005;
                            avatar.rotation.y += 0.005;
                            avatar.position.z = Math.sin(avatarTime * 2) * 0.5;
                        });
                    });
                    
                    // 旋转线条
                    line.rotation.y += 0.002;
                    line.rotation.x += 0.001;
                    
                    renderer.render(scene, camera);
                }
                
                // 开始动画
                animate();
            }
            
            // 响应窗口大小变化
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
</body>
</html>
