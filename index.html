<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代际知识库 - 理解世代差异，支撑业务决策</title>
    <link rel="icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=intergenerational%20knowledge%20base%20icon%20book%20generations%20symbol%20minimal%20design&image_size=square" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#8B5CF6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .hero-gradient {
            background: linear-gradient(135deg, #4F46E5 0%, #8B5CF6 100%);
        }
        
        .generations-animation {
            position: relative;
            height: 300px;
            width: 100%;
        }
        
        .generation-circle {
            position: absolute;
            border-radius: 50%;
            animation: float 6s ease-in-out infinite;
        }
        
        .gen-1 {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            top: 20%;
            left: 20%;
            animation-delay: 0s;
        }
        
        .gen-2 {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.3);
            top: 50%;
            left: 70%;
            animation-delay: 1s;
        }
        
        .gen-3 {
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.15);
            top: 70%;
            left: 40%;
            animation-delay: 2s;
        }
        
        .gen-4 {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.4);
            top: 30%;
            left: 80%;
            animation-delay: 3s;
        }
        
        .gen-5 {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.25);
            top: 60%;
            left: 10%;
            animation-delay: 4s;
        }
        
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }
        
        .btn-hover {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-hover::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }
        
        .btn-hover:hover::before {
            left: 100%;
        }
        
        .fade-in {
            animation: fadeIn 1s ease-in-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .stagger-1 {
            animation-delay: 0.2s;
        }
        
        .stagger-2 {
            animation-delay: 0.4s;
        }
        
        .stagger-3 {
            animation-delay: 0.6s;
        }
        
        .stagger-4 {
            animation-delay: 0.8s;
        }
    </style>
</head>
<body class="hero-gradient min-h-screen flex items-center justify-center">
    <div class="absolute inset-0 overflow-hidden">
        <!-- 背景动画 -->
        <div class="generations-animation">
            <div class="generation-circle gen-1"></div>
            <div class="generation-circle gen-2"></div>
            <div class="generation-circle gen-3"></div>
            <div class="generation-circle gen-4"></div>
            <div class="generation-circle gen-5"></div>
        </div>
    </div>
    
    <div class="container mx-auto px-4 sm:px-6 lg:px-8 z-10">
        <div class="text-center max-w-4xl mx-auto">
            <!-- 标志 -->
            <div class="fade-in mb-8">
                <div class="w-24 h-24 bg-white/20 backdrop-blur-lg rounded-full flex items-center justify-center mx-auto mb-6">
                    <i class="fa fa-book text-white text-4xl"></i>
                </div>
                <h1 class="text-5xl sm:text-6xl font-bold text-white mb-6">
                    代际知识库
                </h1>
                <p class="text-xl text-white/90 mb-8">
                    理解世代差异，支撑业务决策
                </p>
            </div>
            
            <!-- 核心价值 -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
                <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 fade-in stagger-1">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa fa-users text-white text-xl"></i>
                    </div>
                    <h3 class="text-white font-semibold mb-2">代际洞察</h3>
                    <p class="text-white/80 text-sm">深度解析不同世代的价值观与行为模式</p>
                </div>
                
                <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 fade-in stagger-2">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa fa-lightbulb-o text-white text-xl"></i>
                    </div>
                    <h3 class="text-white font-semibold mb-2">创新方法</h3>
                    <p class="text-white/80 text-sm">前沿的代际研究理论与实践方法</p>
                </div>
                
                <div class="bg-white/10 backdrop-blur-lg rounded-xl p-6 fade-in stagger-3">
                    <div class="w-12 h-12 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa fa-line-chart text-white text-xl"></i>
                    </div>
                    <h3 class="text-white font-semibold mb-2">决策支持</h3>
                    <p class="text-white/80 text-sm">为企业战略与营销决策提供科学依据</p>
                </div>
            </div>
            
            <!-- 访问按钮 -->
            <div class="fade-in stagger-4">
                <a href="home.html" class="btn-hover inline-block px-10 py-4 bg-white text-primary font-semibold rounded-full shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1">
                    <i class="fa fa-arrow-right mr-2"></i>立即访问
                </a>
                <p class="text-white/70 text-sm mt-4">
                    探索从婴儿潮到Beta世代的完整代际序列
                </p>
            </div>
        </div>
    </div>
    
    <!-- 页脚 -->
    <footer class="absolute bottom-8 left-0 right-0 text-center z-10">
        <p class="text-white/60 text-sm">
            © 2026 代际知识库 | 大器层·代际研究
        </p>
    </footer>
    
    <script>
        // 添加页面加载动画
        window.addEventListener('load', function() {
            document.body.classList.add('loaded');
        });
        
        // 为按钮添加点击效果
        const accessBtn = document.querySelector('.btn-hover');
        accessBtn.addEventListener('click', function(e) {
            e.preventDefault();
            // 添加点击动画
            this.classList.add('scale-95');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 200);
        });
    </script>
</body>
</html>
