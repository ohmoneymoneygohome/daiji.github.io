<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代际知识库 - 理解世代差异，支撑业务决策</title>
    <link rel="icon" href="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=intergenerational%20knowledge%20base%20icon%20book%20generations%20symbol%20minimal%20design&image_size=square" type="image/png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#8B5CF6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        
        .hero-section {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('wallhaven-0wqo7r.jpg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }
        
        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.8) 0%, rgba(139, 92, 246, 0.8) 100%);
            z-index: 1;
        }
        
        #webgl-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        
        .btn-hover {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-hover::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s ease;
        }
        
        .btn-hover:hover::before {
            left: 100%;
        }
        
        .fade-in {
            animation: fadeIn 1.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <section class="hero-section">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        
        <!-- WebGL 3D动画 -->
        <canvas id="webgl-canvas"></canvas>
        
        <div class="container mx-auto px-4 sm:px-6 lg:px-8 z-30 text-center">
            <div class="fade-in">
                <h1 class="text-5xl sm:text-7xl font-bold text-white mb-6">
                    代际知识库
                </h1>
                <p class="text-xl sm:text-2xl text-white/90 mb-12 max-w-2xl mx-auto">
                    理解世代差异，支撑业务决策
                </p>
                <a href="home.html" class="btn-hover inline-block px-12 py-5 bg-white text-primary font-semibold rounded-full shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 text-lg">
                    <i class="fa fa-arrow-right mr-2"></i>立即访问
                </a>
            </div>
        </div>
        
        <!-- 页脚 -->
        <footer class="absolute bottom-8 left-0 right-0 text-center z-30">
            <p class="text-white/60 text-sm">
                © 2026 代际知识库 | 大器层·代际研究
            </p>
        </footer>
    </section>
    
    <script>
        // 为按钮添加点击效果
        const accessBtn = document.querySelector('.btn-hover');
        accessBtn.addEventListener('click', function(e) {
            e.preventDefault();
            // 添加点击动画
            this.classList.add('scale-95');
            setTimeout(() => {
                window.location.href = 'home.html';
            }, 200);
        });
        
        // WebGL 3D动画
        (function() {
            // 创建场景
            const scene = new THREE.Scene();
            
            // 创建相机
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;
            
            // 创建渲染器
            const renderer = new THREE.WebGLRenderer({ 
                canvas: document.getElementById('webgl-canvas'),
                alpha: true,
                antialias: true
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            
            // 创建世代粒子系统
            const generations = [];
            const generationColors = [
                0x4F46E5, // 主色
                0x8B5CF6, // 次要色
                0x4682B4, // X世代
                0x32CD32, // Y世代
                0xFF6347, // Z世代
                0x9370DB, // α世代
                0xFFD700  // Beta世代
            ];
            
            // 创建粒子几何体
            function createParticles(color, count, size) {
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(count * 3);
                const colors = new Float32Array(count * 3);
                
                const colorObj = new THREE.Color(color);
                
                for (let i = 0; i < count * 3; i += 3) {
                    // 随机位置
                    positions[i] = (Math.random() - 0.5) * 10;
                    positions[i + 1] = (Math.random() - 0.5) * 10;
                    positions[i + 2] = (Math.random() - 0.5) * 10;
                    
                    // 颜色
                    colors[i] = colorObj.r;
                    colors[i + 1] = colorObj.g;
                    colors[i + 2] = colorObj.b;
                }
                
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                
                const material = new THREE.PointsMaterial({
                    size: size,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8,
                    blending: THREE.AdditiveBlending
                });
                
                const particles = new THREE.Points(geometry, material);
                scene.add(particles);
                
                return particles;
            }
            
            // 创建不同世代的粒子
            for (let i = 0; i < generationColors.length; i++) {
                const particles = createParticles(generationColors[i], 100, 0.05 + i * 0.02);
                generations.push({
                    particles: particles,
                    speed: 0.005 + i * 0.002,
                    rotationSpeed: 0.001 + i * 0.0005
                });
            }
            
            // 创建世代连接线条
            const lineGeometry = new THREE.BufferGeometry();
            const linePositions = new Float32Array(generationColors.length * 3);
            
            for (let i = 0; i < generationColors.length; i++) {
                linePositions[i * 3] = Math.sin(i * Math.PI * 2 / generationColors.length) * 3;
                linePositions[i * 3 + 1] = Math.cos(i * Math.PI * 2 / generationColors.length) * 3;
                linePositions[i * 3 + 2] = 0;
            }
            
            lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
            
            const lineMaterial = new THREE.LineBasicMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.3
            });
            
            const line = new THREE.LineLoop(lineGeometry, lineMaterial);
            scene.add(line);
            
            // 动画循环
            function animate() {
                requestAnimationFrame(animate);
                
                // 旋转和移动粒子
                generations.forEach((gen, index) => {
                    gen.particles.rotation.x += gen.rotationSpeed;
                    gen.particles.rotation.y += gen.rotationSpeed;
                    
                    // 粒子脉动效果
                    const time = Date.now() * 0.001;
                    gen.particles.scale.set(
                        1 + Math.sin(time * gen.speed * 2) * 0.2,
                        1 + Math.sin(time * gen.speed * 2) * 0.2,
                        1 + Math.sin(time * gen.speed * 2) * 0.2
                    );
                });
                
                // 旋转线条
                line.rotation.y += 0.002;
                line.rotation.x += 0.001;
                
                renderer.render(scene, camera);
            }
            
            // 响应窗口大小变化
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
            
            // 开始动画
            animate();
        })();
    </script>
</body>
</html>
